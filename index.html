DATA.forEach((l,i)=>{let o=document.createElement('option');o.value=i;o.textContent=l.name+'（'+l.items.length+'个）';listSel.appendChild(o);});
listSel.onchange=render;
function speak(text, cb){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.82; u.pitch=1; u.onend=()=>cb&&cb(); speechSynthesis.speak(u); }
function render(){ const l=DATA[+listSel.value]; app.innerHTML=''; l.items.forEach((it,i)=>{ const div=document.createElement('div'); div.className='card'; div.innerHTML=`<div><div class="idx">${l.name} · ${i+1}</div><div class="word">${it.word}</div><div class="cn" style="display:${showCN?'block':'none'}">${it.cn}</div></div><div class="actions"><button>播放</button></div>`; div.querySelector('button').onclick=()=>speak(it.word); div.querySelector('.word').onclick=()=>speak(it.word); app.appendChild(div); }); }
function toggleCN(){showCN=!showCN; render();}
function stopSpeak(){playing=false; speechSynthesis.cancel();}
function playList(){ const items=DATA[+listSel.value].items; let i=0; playing=true; const next=()=>{ if(!playing||i>=items.length){playing=false;return;} speak(items[i++].word,()=>setTimeout(next,450)); }; next(); }
render();
</script></body></html>
